<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 Annual Day Music Player</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --bg2: #0a0f1e;
    --bg3: #0f1628;
    --card: #111827;
    --card2: #1a2236;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #a855f7;
    --gold: #ffd700;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --glow: 0 0 20px rgba(0,212,255,0.4);
    --glow2: 0 0 20px rgba(255,107,53,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(168,85,247,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 90%, rgba(255,107,53,0.03) 0%, transparent 60%);
  }

  /* ─── LOGIN ─── */
  #loginScreen {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 30% 40%, rgba(0,212,255,0.08) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 70%, rgba(168,85,247,0.07) 0%, transparent 55%);
  }
  #loginScreen.gone { display: none; }
  .lc {
    background: linear-gradient(135deg, var(--card), var(--card2));
    border: 1px solid var(--border); border-radius: 24px;
    padding: 2.4rem 2rem 2rem; width: 320px; max-width: 92vw;
    text-align: center; box-shadow: 0 24px 64px rgba(0,0,0,0.8);
    position: relative; overflow: hidden;
  }
  .lc::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--accent2), var(--accent), transparent);
    animation: gline 3s linear infinite;
  }
  @keyframes gline { 0%{opacity:.5} 50%{opacity:1} 100%{opacity:.5} }
  .lc-logo { font-size: 3.2rem; margin-bottom:.4rem; animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.3)} }
  .lc-title {
    font-family:'Orbitron',monospace; font-size:1rem; font-weight:900;
    background: linear-gradient(135deg, var(--gold), var(--accent2), var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    letter-spacing:2px; margin-bottom:.2rem;
  }
  .lc-sub {
    font-family:'Rajdhani',sans-serif; color:var(--text2); font-size:.75rem;
    letter-spacing:4px; text-transform:uppercase; margin-bottom:1.6rem;
  }
  .lc-row { position:relative; margin-bottom:.9rem; }
  .lc-input {
    width:100%; background:var(--bg3); border:1.5px solid var(--border);
    border-radius:12px; padding:.8rem 2.8rem .8rem 1.1rem;
    color:var(--text); font-family:'Exo 2',sans-serif; font-size:1.05rem;
    letter-spacing:5px; outline:none; text-align:center;
    transition: border-color .2s, box-shadow .2s;
  }
  .lc-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,212,255,.12); }
  .lc-input.shake {
    border-color:#ef4444; box-shadow:0 0 0 3px rgba(239,68,68,.12);
    animation: shk .35s ease;
  }
  @keyframes shk {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)}
    40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
  }
  .lc-eye {
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--text2); cursor:pointer; font-size:.95rem; padding:4px;
    transition:color .2s;
  }
  .lc-eye:hover { color:var(--accent); }
  .lc-btn {
    width:100%; padding:.8rem;
    background:linear-gradient(135deg,var(--accent),var(--accent3));
    border:none; border-radius:12px; color:white; font-family:'Orbitron',monospace;
    font-size:.8rem; font-weight:700; letter-spacing:3px; cursor:pointer;
    transition:all .2s; box-shadow:var(--glow); margin-bottom:.7rem;
  }
  .lc-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,212,255,.45); }
  .lc-btn:active { transform:translateY(0); }
  .lc-msg { font-size:.76rem; min-height:1.1em; font-family:'Exo 2',sans-serif; color:var(--text2); }
  .lc-msg.err { color:#ef4444; }
  .lc-msg.ok  { color:#00ff88; }

  /* ─── STARS ─── */
  .stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .star {
    position:absolute; width:2px; height:2px; background:white; border-radius:50%;
    animation: twinkle var(--d) ease-in-out infinite; opacity:0;
  }
  @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--o)} }

  /* ─── LAYOUT ─── */
  .main-wrapper { position:relative; z-index:1; }
  .header { text-align:center; padding:1.8rem 1rem .8rem; }
  .header-title {
    font-family:'Orbitron',monospace; font-size:clamp(1.3rem,4vw,2.6rem); font-weight:900;
    background:linear-gradient(135deg,var(--gold),var(--accent2),var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    letter-spacing:3px; animation:pulse 3s ease-in-out infinite;
  }
  .header-sub {
    font-family:'Rajdhani',sans-serif; color:var(--text2);
    font-size:.95rem; letter-spacing:6px; text-transform:uppercase; margin-top:.25rem;
  }
  .main-layout {
    display:grid; grid-template-columns:1fr 360px; gap:1.4rem;
    max-width:1400px; margin:0 auto; padding:.8rem 1.4rem 2rem;
  }
  @media(max-width:900px){ .main-layout{ grid-template-columns:1fr; } }

  /* ─── NOW PLAYING CARD ─── */
  .player-section { display:flex; flex-direction:column; gap:1.1rem; }
  .np-card {
    background:linear-gradient(135deg,var(--card),var(--card2));
    border:1px solid var(--border); border-radius:20px;
    padding:1.4rem; position:relative; overflow:hidden;
    box-shadow:0 8px 32px rgba(0,0,0,.5);
  }
  .np-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),var(--accent3),var(--accent2),transparent);
    animation:gline 3s linear infinite;
  }
  .track-info { display:flex; align-items:center; gap:1.1rem; margin-bottom:1.1rem; }
  .artwork {
    width:76px; height:76px; border-radius:14px; flex-shrink:0;
    background:linear-gradient(135deg,var(--bg3),var(--card2));
    border:1px solid var(--border); display:flex; align-items:center;
    justify-content:center; font-size:2.1rem; position:relative; overflow:hidden;
  }
  .artwork.spin { animation:rotatedisc 4s linear infinite; }
  @keyframes rotatedisc { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .artwork::after {
    content:''; position:absolute; inset:0; border-radius:14px;
    background:linear-gradient(135deg,rgba(0,212,255,.15),transparent);
  }
  .track-details { flex:1; min-width:0; }
  .t-num {
    font-family:'Orbitron',monospace; font-size:.62rem; color:var(--accent);
    letter-spacing:3px; text-transform:uppercase; margin-bottom:.18rem;
  }
  .t-name {
    font-family:'Rajdhani',sans-serif; font-size:1.35rem; font-weight:700;
    color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.2;
  }
  .t-cat { font-size:.78rem; color:var(--accent2); margin-top:.15rem; font-weight:600; letter-spacing:1px; }

  /* ─── VISUALIZER ─── */
  .viz-wrap {
    background:var(--bg); border-radius:13px; border:1px solid var(--border);
    padding:.9rem; margin-bottom:1.1rem; overflow:hidden;
  }
  .viz-label {
    font-family:'Orbitron',monospace; font-size:.58rem; letter-spacing:4px;
    color:var(--text2); text-align:center; margin-bottom:.5rem; text-transform:uppercase;
  }
  #vizCanvas { width:100%; height:115px; display:block; border-radius:8px; }

  /* ─── PROGRESS ─── */
  .prog-sec { margin-bottom:.9rem; }
  .times {
    display:flex; justify-content:space-between;
    font-family:'Orbitron',monospace; font-size:.68rem; color:var(--text2); margin-bottom:.45rem;
  }
  .prog-track {
    width:100%; height:6px; background:var(--bg3); border-radius:3px;
    cursor:pointer; position:relative; overflow:visible;
  }
  .prog-bar {
    height:100%; background:linear-gradient(90deg,var(--accent),var(--accent3));
    border-radius:3px; width:0%; transition:width .1s linear;
    position:relative; box-shadow:var(--glow);
  }
  .prog-bar::after {
    content:''; position:absolute; right:-5px; top:-4px;
    width:14px; height:14px; background:white; border-radius:50%;
    box-shadow:var(--glow); transform:scale(0); transition:transform .2s;
  }
  .prog-track:hover .prog-bar::after { transform:scale(1); }

  /* ─── CONTROLS ─── */
  .ctrl-row { display:flex; align-items:center; justify-content:center; gap:.95rem; margin-bottom:1.1rem; }
  .cb { background:none; border:none; cursor:pointer; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:all .2s; color:var(--text2); }
  .cb:hover { color:var(--accent); transform:scale(1.1); }
  .cb.s { width:40px; height:40px; font-size:1.1rem; }
  .cb.p {
    width:58px; height:58px; font-size:1.45rem;
    background:linear-gradient(135deg,var(--accent),var(--accent3));
    color:white; box-shadow:var(--glow); border-radius:50%;
  }
  .cb.p:hover { transform:scale(1.08); box-shadow:0 0 30px rgba(0,212,255,.6); }
  .cb.p:active { transform:scale(.96); }

  /* ─── VOLUME ─── */
  .vol-sec {
    display:flex; align-items:center; gap:.9rem;
    background:var(--bg3); border-radius:12px; padding:.75rem 1.1rem; border:1px solid var(--border);
  }
  .vol-lbl { font-family:'Orbitron',monospace; font-size:.62rem; letter-spacing:2px; color:var(--text2); white-space:nowrap; }
  .knob-wrap { position:relative; width:50px; height:50px; flex-shrink:0; }
  .knob {
    width:50px; height:50px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#2a3a5c,#0a0f1e);
    border:2px solid var(--border); cursor:grab; position:relative;
    transition:border-color .2s;
    box-shadow:0 4px 12px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05);
  }
  .knob:active { cursor:grabbing; border-color:var(--accent); }
  .knob-ring {
    position:absolute; inset:-4px; border-radius:50%;
    border:2px solid transparent; border-top-color:var(--accent); border-right-color:var(--accent);
    opacity:.4; transform:rotate(-135deg); transition:opacity .2s;
  }
  .knob:hover .knob-ring { opacity:.8; }
  .knob-dot {
    position:absolute; top:6px; left:50%; width:3px; height:10px;
    background:var(--accent); border-radius:2px; box-shadow:0 0 6px var(--accent);
    transform-origin:1.5px 19px;
  }
  .vol-slide-wrap { flex:1; }
  .vol-slide {
    width:100%; -webkit-appearance:none; height:4px;
    background:var(--bg); border-radius:2px; outline:none; cursor:pointer;
  }
  .vol-slide::-webkit-slider-thumb {
    -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
    background:var(--accent); box-shadow:var(--glow); cursor:pointer;
  }
  .vol-pct { font-family:'Orbitron',monospace; font-size:.68rem; color:var(--accent); min-width:34px; text-align:right; }

  /* ─── QUICK JUMP ─── */
  .qj-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:.9rem; }
  .sec-title { font-family:'Orbitron',monospace; font-size:.72rem; letter-spacing:3px; color:var(--accent); text-transform:uppercase; margin-bottom:.7rem; }
  .qj-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(138px,1fr));
    gap:.45rem; max-height:190px; overflow-y:auto; padding-right:3px;
  }
  .qj-grid::-webkit-scrollbar { width:4px; }
  .qj-grid::-webkit-scrollbar-track { background:var(--bg); }
  .qj-grid::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .qj-btn {
    background:var(--card); border:1px solid var(--border); color:var(--text2);
    padding:.48rem .55rem; border-radius:10px; font-size:.68rem;
    font-family:'Exo 2',sans-serif; cursor:pointer; text-align:left;
    transition:all .18s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    display:block; width:100%; line-height:1.4;
  }
  .qj-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--card2); }
  .qj-btn.active {
    border-color:var(--accent); background:rgba(0,212,255,.12);
    color:var(--accent); box-shadow:0 0 10px rgba(0,212,255,.2);
  }
  .qj-btn .qn { font-family:'Orbitron',monospace; font-size:.58rem; color:var(--accent2); display:block; }

  /* ─── PLAYLIST PANEL ─── */
  .pl-section { display:flex; flex-direction:column; gap:.9rem; }
  .pl-header { display:flex; align-items:center; justify-content:space-between; gap:.4rem; flex-wrap:wrap; }
  .pl-actions { display:flex; gap:.4rem; flex-wrap:wrap; }
  .ab {
    background:var(--card2); border:1px solid var(--border); color:var(--text2);
    padding:.42rem .85rem; border-radius:8px; font-size:.73rem;
    font-family:'Rajdhani',sans-serif; font-weight:600; cursor:pointer;
    letter-spacing:1px; transition:all .2s; display:flex; align-items:center; gap:.35rem;
  }
  .ab:hover { border-color:var(--accent); color:var(--accent); }
  .ab.danger:hover { border-color:#ef4444; color:#ef4444; }
  input[type=file] { display:none; }

  .pl-list {
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    overflow:hidden; max-height:500px; overflow-y:auto; flex:1;
  }
  .pl-list::-webkit-scrollbar { width:4px; }
  .pl-list::-webkit-scrollbar-track { background:var(--bg); }
  .pl-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .pi {
    display:flex; align-items:center; gap:.65rem; padding:.72rem .95rem;
    border-bottom:1px solid rgba(255,255,255,.04); cursor:pointer;
    transition:all .17s; position:relative; user-select:none;
  }
  .pi:hover { background:var(--card2); }
  .pi.active { background:rgba(0,212,255,.07); border-left:3px solid var(--accent); }
  .pi.dragging { opacity:.45; background:var(--card2); }
  .pi.drag-over { border-top:2px solid var(--accent); }
  .dh { color:var(--text2); font-size:.9rem; cursor:grab; opacity:.35; transition:opacity .2s; flex-shrink:0; }
  .pi:hover .dh { opacity:.75; }
  .pi-num { font-family:'Orbitron',monospace; font-size:.62rem; color:var(--text2); min-width:20px; text-align:center; }
  .pi-icon { display:none; color:var(--accent); font-size:.72rem; gap:2px; }
  .pi-icon span { animation:bar .6s infinite alternate; }
  .pi-icon span:nth-child(2) { animation-delay:.15s; }
  .pi-icon span:nth-child(3) { animation-delay:.3s; }
  @keyframes bar { from{transform:scaleY(.5)} to{transform:scaleY(1.3)} }
  .pi.active .pi-num { display:none; }
  .pi.active .pi-icon { display:flex; }
  .pi-det { flex:1; min-width:0; }
  .pi-name { font-size:.8rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pi-cat { font-size:.66rem; color:var(--text2); margin-top:1px; }
  .pi.active .pi-name { color:var(--accent); }
  .pi-del {
    background:none; border:none; color:transparent; cursor:pointer;
    padding:4px; border-radius:6px; font-size:.78rem; transition:all .2s; flex-shrink:0;
  }
  .pi:hover .pi-del { color:#ef4444; }
  .pi-del:hover { background:rgba(239,68,68,.15); }

  /* loading spinner on track */
  .pi-loading { display:none; width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin2 .7s linear infinite; flex-shrink:0; }
  @keyframes spin2 { to{transform:rotate(360deg)} }
  .pi.loading-track .pi-loading { display:block; }

  /* ─── SORT MODAL ─── */
  .modal-bg {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.72); z-index:200;
    align-items:center; justify-content:center; backdrop-filter:blur(4px);
  }
  .modal-bg.show { display:flex; }
  .modal {
    background:var(--card); border:1px solid var(--border); border-radius:20px;
    padding:1.4rem; max-width:300px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,.85);
  }
  .modal-ttl { font-family:'Orbitron',monospace; font-size:.78rem; letter-spacing:2px; color:var(--accent); margin-bottom:.9rem; text-transform:uppercase; }
  .so-opts { display:flex; flex-direction:column; gap:.45rem; }
  .so { background:var(--card2); border:1px solid var(--border); color:var(--text); padding:.65rem .9rem; border-radius:10px; cursor:pointer; font-family:'Exo 2',sans-serif; font-size:.83rem; text-align:left; transition:all .2s; }
  .so:hover { border-color:var(--accent); color:var(--accent); }
  .mc { margin-top:.9rem; width:100%; background:none; border:1px solid var(--border); color:var(--text2); padding:.55rem; border-radius:10px; cursor:pointer; font-family:'Exo 2',sans-serif; transition:all .2s; }
  .mc:hover { border-color:#ef4444; color:#ef4444; }

  /* ─── TOAST ─── */
  #toast {
    position:fixed; bottom:1.2rem; right:1.2rem; z-index:500;
    background:rgba(0,212,255,.15); border:1px solid var(--accent);
    color:var(--accent); padding:.45rem .9rem; border-radius:10px;
    font-family:'Orbitron',monospace; font-size:.65rem; letter-spacing:2px;
    opacity:0; transition:opacity .3s; pointer-events:none;
  }
  #toast.show { opacity:1; }
  #toast.warn { background:rgba(255,107,53,.15); border-color:var(--accent2); color:var(--accent2); }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="lc">
    <div class="lc-logo">🎭</div>
    <div class="lc-title">ANNUAL DAY 2025</div>
    <div class="lc-sub">Music Player · Stage Control</div>
    <div class="lc-row">
      <input class="lc-input" type="password" id="pwInput"
        placeholder="Enter Password" autocomplete="off"
        onkeydown="if(event.key==='Enter')doLogin()">
      <button class="lc-eye" onclick="toggleEye()" id="eyeBtn">👁</button>
    </div>
    <button class="lc-btn" onclick="doLogin()">🔓 ENTER</button>
    <div class="lc-msg" id="lcMsg"></div>
  </div>
</div>

<div class="stars" id="stars"></div>
<div id="toast"></div>

<div class="main-wrapper">
  <div class="header">
    <div class="header-title">🎭 ANNUAL DAY 2025</div>
    <div class="header-sub">Music Player · Stage Control</div>
  </div>

  <div class="main-layout">
    <!-- LEFT -->
    <div class="player-section">
      <div class="np-card">
        <div class="track-info">
          <div class="artwork" id="artwork">🎵</div>
          <div class="track-details">
            <div class="t-num" id="tNum">TRACK 01 / 21</div>
            <div class="t-name" id="tName">Welcome Dance UKG</div>
            <div class="t-cat" id="tCat">🏷 UKG</div>
          </div>
        </div>
        <div class="viz-wrap">
          <div class="viz-label">⬡ EQUALIZER VISUALIZER ⬡</div>
          <canvas id="vizCanvas"></canvas>
        </div>
        <div class="prog-sec">
          <div class="times"><span id="curT">0:00</span><span id="totT">0:00</span></div>
          <div class="prog-track" id="progTrack"><div class="prog-bar" id="progBar"></div></div>
        </div>
        <div class="ctrl-row">
          <button class="cb s" onclick="toggleShuffle()" id="shuffleBtn" title="Shuffle">🔀</button>
          <button class="cb s" onclick="prevTrack()" title="Prev">⏮</button>
          <button class="cb p" onclick="togglePlay()" id="playBtn">▶</button>
          <button class="cb s" onclick="nextTrack()" title="Next">⏭</button>
          <button class="cb s" onclick="toggleRepeat()" id="repeatBtn" title="Repeat">🔁</button>
        </div>
        <div class="vol-sec">
          <span class="vol-lbl">VOL</span>
          <div class="knob-wrap">
            <div class="knob" id="knob">
              <div class="knob-ring"></div>
              <div class="knob-dot" id="knobDot"></div>
            </div>
          </div>
          <div class="vol-slide-wrap">
            <input type="range" class="vol-slide" id="volSlide" min="0" max="100" value="80">
          </div>
          <div class="vol-pct" id="volPct">80%</div>
        </div>
      </div>

      <!-- Quick Jump -->
      <div class="qj-card">
        <div class="sec-title">⚡ Quick Jump</div>
        <div class="qj-grid" id="qjGrid"></div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="pl-section">
      <div class="pl-header">
        <div class="sec-title" style="margin-bottom:0">📋 Playlist</div>
        <div class="pl-actions">

// ════════════════════════════════════════════

];

// Working playlist (can be reordered via drag/sort — saved to localStorage)
// We store only order & any renames; URLs always come from PLAYLIST_MASTER by num key
const LS_ORDER = 'annualday_order_v1';
let playlist = []; // array of indices into PLAYLIST_MASTER

function loadOrder() {
  try {
    const raw = localStorage.getItem(LS_ORDER);
    if (raw) {
      const order = JSON.parse(raw);
      // Validate — only keep valid indices
      const valid = order.filter(i => i >= 0 && i < PLAYLIST_MASTER.length);
      // Add any new songs not yet in saved order
      PLAYLIST_MASTER.forEach((_,i) => { if (!valid.includes(i)) valid.push(i); });
      playlist = valid;
      return;
    }
  } catch(e) {}
  playlist = PLAYLIST_MASTER.map((_,i) => i);
}

function saveOrder() {
  try { localStorage.setItem(LS_ORDER, JSON.stringify(playlist)); } catch(e) {}
}

function track(i) { return PLAYLIST_MASTER[playlist[i]]; }

// ════════════════════════════════════════════
// AUDIO + VISUALIZER
// ════════════════════════════════════════════
const audio = document.getElementById('audioEl');
let audioCtx = null, analyser = null;
let currentIdx = 0, isPlaying = false, doShuffle = false, doRepeat = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;
  const src = audioCtx.createMediaElementSource(audio);
  src.connect(analyser);
  analyser.connect(audioCtx.destination);
}

const canvas = document.getElementById('vizCanvas');
const ctx2 = canvas.getContext('2d');
function resizeCvs() {
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  ctx2.scale(devicePixelRatio, devicePixelRatio);
}
resizeCvs();
window.addEventListener('resize', resizeCvs);

let idlePhase = 0;
function drawViz() {
  requestAnimationFrame(drawViz);
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  ctx2.clearRect(0,0,W,H);
  const bars=48, gap=3, bw=(W-gap*(bars+1))/bars;
  let data;
  if (analyser && isPlaying) {
    data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
  }
  idlePhase += 0.04;
  for (let i=0;i<bars;i++) {
    let val = data ? data[Math.floor(i*data.length/bars)]/255 : Math.sin(idlePhase+i*0.3)*0.14+0.07;
    const bh=Math.max(3,val*H), x=gap+i*(bw+gap), y=H-bh;
    const segH=5,segG=2,segs=Math.floor(bh/(segH+segG));
    for (let s=0;s<segs;s++){
      const sy=y+s*(segH+segG), frac=1-s/segs;
      let r,g,b;
      if(frac<.5){r=0;g=255;b=100;}
      else if(frac<.8){r=255;g=220;b=0;}
      else{r=255;g=50;b=50;}
      ctx2.shadowBlur=data?8:3;
      ctx2.shadowColor=`rgb(${r},${g},${b})`;
      ctx2.fillStyle=`rgba(${r},${g},${b},${data?0.9:0.45})`;
      ctx2.fillRect(x,sy,bw,segH);
    }
  }
  ctx2.shadowBlur=0;
}
drawViz();

// ════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════
function render() {
  renderPlaylist();
  renderQJ();
  updateNP();
}

function renderPlaylist() {
  const el = document.getElementById('plList');
  el.innerHTML = '';
  playlist.forEach((masterIdx, i) => {
    const t = PLAYLIST_MASTER[masterIdx];
    const div = document.createElement('div');
    div.className = 'pi' + (i===currentIdx?' active':'');
    div.draggable = true;
    div.dataset.index = i;
    div.innerHTML = `
      <span class="dh" title="Drag to reorder">⠿</span>
      <span class="pi-num">${String(i+1).padStart(2,'0')}</span>
      <span class="pi-icon"><span>▌</span><span>▌</span><span>▌</span></span>
      <div class="pi-loading"></div>
      <div class="pi-det">
        <div class="pi-name">${t.emoji} ${t.displayName}</div>
        <div class="pi-cat">${t.category || 'General'} &nbsp;·&nbsp; #${t.num}</div>
      </div>`;
    div.addEventListener('click', e => {
      if(e.target.classList.contains('dh')) return;
      loadTrack(i, true);
    });
    div.addEventListener('dragstart', dStart);
    div.addEventListener('dragover',  dOver);
    div.addEventListener('dragleave', dLeave);
    div.addEventListener('drop',      dDrop);
    div.addEventListener('dragend',   dEnd);
    el.appendChild(div);
  });
}

function renderQJ() {
  const el = document.getElementById('qjGrid');
  el.innerHTML = '';
  playlist.forEach((masterIdx, i) => {
    const t = PLAYLIST_MASTER[masterIdx];
    const btn = document.createElement('button');
    btn.className = 'qj-btn' + (i===currentIdx?' active':'');
    btn.innerHTML = `<span class="qn">#${String(i+1).padStart(2,'0')}</span>${t.emoji} ${t.displayName}`;
    btn.title = t.displayName;
    btn.onclick = () => loadTrack(i, true);
    el.appendChild(btn);
  });
}

function updateNP() {
  const t = track(currentIdx);
  document.getElementById('tNum').textContent  = `TRACK ${String(currentIdx+1).padStart(2,'0')} / ${String(playlist.length).padStart(2,'0')}`;
  document.getElementById('tName').textContent = t.displayName;
  document.getElementById('tCat').textContent  = t.category ? `🏷 ${t.category}` : '🎵 Performance';
  document.getElementById('artwork').textContent = t.emoji;
  document.querySelectorAll('.pi')[currentIdx]?.scrollIntoView({behavior:'smooth',block:'nearest'});
  document.querySelectorAll('.qj-btn')[currentIdx]?.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ════════════════════════════════════════════
// LOAD & PLAY  — stream via proxy (fixes CORS)
// ════════════════════════════════════════════

// Extract Drive file ID from any Drive URL format
function driveId(url) {
  const m = url.match(/[?&]id=([^&]+)/);
  return m ? m[1] : null;
}

// Build a working streamable URL — tries multiple methods
function streamUrl(driveUrl) {
  const id = driveId(driveUrl);
  if (!id) return driveUrl;
  // Use allorigins proxy — reliably bypasses CORS for Drive files
  const target = `https://drive.google.com/uc?export=download&confirm=t&id=${id}`;
  return `https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`;
}

function loadTrack(idx, play=false) {
  if (idx<0||idx>=playlist.length) return;
  currentIdx = idx;
  const t = track(idx);

  const url = streamUrl(t.url);
  audio.src = url;
  audio.load();

  render();

  if (play) {
    initAudio();
    if (audioCtx.state==='suspended') audioCtx.resume();
    document.querySelectorAll('.pi')[idx]?.classList.add('loading-track');
    showToast('⏳ Loading ' + t.displayName);

    audio.play()
      .then(() => {
        isPlaying = true;
        updateBtn();
        document.querySelectorAll('.pi')[idx]?.classList.remove('loading-track');
        showToast('▶ ' + t.displayName);
      })
      .catch(err => {
        document.querySelectorAll('.pi')[idx]?.classList.remove('loading-track');
        // Fallback: try direct Drive URL without proxy
        console.warn('Proxy failed, trying direct:', err);
        const directUrl = `https://drive.google.com/uc?export=download&confirm=t&id=${driveId(t.url)}`;
        audio.src = directUrl;
        audio.load();
        audio.play()
          .then(() => {
            isPlaying = true;
            updateBtn();
            showToast('▶ ' + t.displayName);
          })
          .catch(err2 => {
            showToast('⚠ Cannot play — make file public in Drive', true);
            console.error('Both methods failed:', err2);
          });
      });
  }
}

function togglePlay() {
  initAudio();
  if (audioCtx.state==='suspended') audioCtx.resume();
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    updateBtn();
  } else {
    if (!audio.src || audio.src === window.location.href) {
      loadTrack(currentIdx, true);
      return;
    }
    showToast('⏳ Loading...');
    audio.play().then(()=>{ isPlaying=true; updateBtn(); showToast('▶ ' + track(currentIdx).displayName); }).catch(()=>{ loadTrack(currentIdx, true); });
  }
}

function updateBtn() {
  document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
  const aw = document.getElementById('artwork');
  isPlaying ? aw.classList.add('spin') : aw.classList.remove('spin');
}

function prevTrack() { loadTrack(currentIdx>0?currentIdx-1:playlist.length-1, isPlaying); }
function nextTrack() {
  const idx = doShuffle ? Math.floor(Math.random()*playlist.length) : (currentIdx+1)%playlist.length;
  loadTrack(idx, isPlaying);
}
function toggleShuffle() {
  doShuffle=!doShuffle;
  document.getElementById('shuffleBtn').style.color = doShuffle?'var(--accent)':'';
}
function toggleRepeat() {
  doRepeat=!doRepeat;
  document.getElementById('repeatBtn').style.color = doRepeat?'var(--accent2)':'';
}

audio.addEventListener('ended',     () => { doRepeat ? audio.play() : nextTrack(); });
audio.addEventListener('play',      () => { isPlaying=true;  updateBtn(); });
audio.addEventListener('pause',     () => { isPlaying=false; updateBtn(); });
audio.addEventListener('timeupdate',() => {
  if (!audio.duration) return;
  const p=(audio.currentTime/audio.duration)*100;
  document.getElementById('progBar').style.width=p+'%';
  document.getElementById('curT').textContent=fmt(audio.currentTime);
  document.getElementById('totT').textContent=fmt(audio.duration);
});
document.getElementById('progTrack').addEventListener('click',e=>{
  if(!audio.duration) return;
  const r=e.currentTarget.getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
});
function fmt(s){
  if(isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
}

// ════════════════════════════════════════════
// VOLUME KNOB
// ════════════════════════════════════════════
let dragging=false,kSY=0,kSV=80,vol=80;
function setVol(v){
  vol=Math.min(100,Math.max(0,v));
  audio.volume=vol/100;
  document.getElementById('volSlide').value=vol;
  document.getElementById('volPct').textContent=Math.round(vol)+'%';
  const d=document.getElementById('knobDot');
  d.style.transform=`translateX(-50%) rotate(${-135+(vol/100)*270}deg)`;
  d.style.transformOrigin='1.5px 19px';
}
const knobEl=document.getElementById('knob');
knobEl.addEventListener('mousedown',e=>{dragging=true;kSY=e.clientY;kSV=vol;e.preventDefault();});
document.addEventListener('mousemove',e=>{if(dragging)setVol(kSV+(kSY-e.clientY)*.8);});
document.addEventListener('mouseup',()=>dragging=false);
knobEl.addEventListener('touchstart',e=>{dragging=true;kSY=e.touches[0].clientY;kSV=vol;},{passive:true});
document.addEventListener('touchmove',e=>{if(dragging)setVol(kSV+(kSY-e.touches[0].clientY)*.8);},{passive:true});
document.addEventListener('touchend',()=>dragging=false);
knobEl.addEventListener('wheel',e=>{e.preventDefault();setVol(vol-e.deltaY*.2);});
document.getElementById('volSlide').addEventListener('input',e=>setVol(+e.target.value));
setVol(80);

// ════════════════════════════════════════════
// DRAG & DROP REORDER
// ════════════════════════════════════════════
let dragSrc=null;
function dStart(e){dragSrc=+e.currentTarget.dataset.index;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dLeave(e){e.currentTarget.classList.remove('drag-over');}
function dDrop(e){
  e.preventDefault();
  const tgt=+e.currentTarget.dataset.index;
  e.currentTarget.classList.remove('drag-over');
  if(dragSrc===null||dragSrc===tgt) return;
  const moved=playlist.splice(dragSrc,1)[0];
  playlist.splice(tgt,0,moved);
  if(dragSrc===currentIdx) currentIdx=tgt;
  else if(dragSrc<currentIdx&&tgt>=currentIdx) currentIdx--;
  else if(dragSrc>currentIdx&&tgt<=currentIdx) currentIdx++;
  saveOrder(); render();
}
function dEnd(e){e.currentTarget.classList.remove('dragging');dragSrc=null;}

// ════════════════════════════════════════════
// SORT
// ════════════════════════════════════════════
function showSort(){document.getElementById('sortModal').classList.add('show');}
function hideSort(){document.getElementById('sortModal').classList.remove('show');}
document.getElementById('sortModal').addEventListener('click',e=>{if(e.target===e.currentTarget)hideSort();});
function doSort(m){
  const curMaster=playlist[currentIdx];
  if(m==='number')     playlist.sort((a,b)=>PLAYLIST_MASTER[a].num - PLAYLIST_MASTER[b].num);
  else if(m==='name')  playlist.sort((a,b)=>PLAYLIST_MASTER[a].displayName.localeCompare(PLAYLIST_MASTER[b].displayName));
  else if(m==='name-desc') playlist.sort((a,b)=>PLAYLIST_MASTER[b].displayName.localeCompare(PLAYLIST_MASTER[a].displayName));
  else if(m==='category')  playlist.sort((a,b)=>(PLAYLIST_MASTER[a].category||'').localeCompare(PLAYLIST_MASTER[b].category||''));
  currentIdx=playlist.indexOf(curMaster);
  if(currentIdx<0) currentIdx=0;
  hideSort(); saveOrder(); render();
}

// ════════════════════════════════════════════
// KEYBOARD
// ════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight') nextTrack();
  if(e.code==='ArrowLeft')  prevTrack();
  if(e.code==='ArrowUp')    setVol(vol+5);
  if(e.code==='ArrowDown')  setVol(vol-5);
});

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
let toastTimer;
function showToast(msg, warn=false){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='show'+(warn?' warn':'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.className='',2200);
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
loadOrder();
render();
// Pre-load first track (no autoplay)
audio.src = streamUrl(track(0).url);
</script>
